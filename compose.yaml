services:
    postgres-products:
      image: postgres:16
      container_name: postgres-products
      environment:
        POSTGRES_DB: bodegasf_products
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5433:5432"
      volumes:
        - postgres_products_data:/var/lib/postgresql/data
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres -d bodegasf_products" ]
        interval: 5s
        timeout: 5s
        retries: 10

    postgres-orders:
      image: postgres:16
      container_name: postgres-orders
      environment:
        POSTGRES_DB: bodegasf_orders
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5434:5432"
      volumes:
        - postgres_orders_data:/var/lib/postgresql/data
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres -d bodegasf_orders" ]
        interval: 5s
        timeout: 5s
        retries: 10

    product-service:
      build:
        context: ./product-service
        dockerfile: Dockerfile
      container_name: product-service
      depends_on:
        - postgres-products
      environment:
        DB_URL: jdbc:postgresql://postgres-products:5432/bodegasf_products
        DB_USER: postgres
        DB_PSWD: postgres
      ports:
        - "8081:8080"

    order-service:
      build:
        context: ./order-service
        dockerfile: Dockerfile
      container_name: order-service
      depends_on:
        - postgres-orders
      environment:
        DB_URL: jdbc:postgresql://postgres-orders:5432/bodegasf_orders
        DB_USER: postgres
        DB_PSWD: postgres
      ports:
        - "8082:8080"

    api-gateway:
      build:
        context: ./api-gateway
        dockerfile: Dockerfile
      container_name: gateway
      depends_on:
        - product-service
        - order-service
      ports:
        - "8080:8080"

volumes:
  postgres_products_data:
  postgres_orders_data: