spring.application.name=api-gateway

server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://product-service:8080
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/bodegasfranc/api/products/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=RewritePath=/bodegasfranc/api/products/?(?<segment>.*), /$\\{segment}

spring.cloud.gateway.server.webmvc.routes[1].id=order-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://order-service:8080
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/bodegasfranc/api/orders/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=RewritePath=/bodegasfranc/api/orders/?(?<segment>.*), /$\\{segment}

management.endpoints.web.exposure.include=health,info

logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.function=INFO
